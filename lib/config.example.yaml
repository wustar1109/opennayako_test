# ═══════════════════════════════════════════
# 系统配置（唯一配置源）
# 复制本文件为 config.yaml 并填入你的信息
# ═══════════════════════════════════════════

# 身份信息
agent:
  name: Vinci                           # 你的助手叫什么
  yuan: hanako                           # 源模板：hanako / butter / ming
user:
  name: ""                               # 你的名字

# API 配置（主通道）
# 凭证从全局 ~/.hanako/added-models.yaml 或当前 agent 的 providers 块读取
api:
  provider: ""                     # dashscope / volcengine / openai / ...

# Embedding 专用 API（可选）
# 如果 embedding 模型和主模型不在同一个 provider，在这里单独配
embedding_api:
  provider: ""                     # embedding 走哪个 provider

# 模型配置
models:
  chat: ""                         # 主对话模型
  utility: ""                      # 工具模型（对话摘要等轻量任务）
  utility_large: ""                # 大工具模型（记忆编译、深度分析等需要理解力的任务）
  embedding: ""                    # 向量模型
  embedding_dimensions: 1024       # 向量维度

# 记忆系统配置
# 高斯衰减：score = score × e^(-λ × t²)，t = days since last access
# 前几天慢、中间加速、尾部趋零，约两周自然归零。
# decay_per_day 就是 λ，控制衰减陡度：
#   λ = 0.01 → 约 19 天归零（慢，记忆广）
#   λ = 0.02 → 约 14 天归零（默认）
#   λ = 0.04 → 约 10 天归零（快，聚焦近期）
# 被 hit 过的记忆会重置衰减起点，常提起的记忆不会消失。
# token_budget 控制 memory.md 能装多少内容。
memory:
  enabled: false                  # 记忆总开关：默认关闭，用户需要时在设置中开启
  token_budget: 2500               # memory.md 的目标 token 预算
  decay_per_day: 0.02              # 高斯衰减系数 λ（越大遗忘越快）
  hit_bonus: 5                     # 每次命中加多少分
  base_importance: 10              # 新记忆的默认初始分
  compile_threshold: 4.5           # 分数低于此值的记忆不进入 memory.md
  forget_speed: 1.0                # 遗忘倍率（1.0 = 正常，2.0 = 忘得快一倍）

# 经验库（默认关闭）：开启后助手会总结工作经验并在后续任务中参考，
# 但经验可能污染上下文，建议明确需要时再打开。
experience:
  enabled: false

# 网页搜索（可选）
# 支持免 Key 浏览器搜索：bing_browser / google_browser / duckduckgo_browser。
# 也支持 API provider：tavily / serper / brave（需要填写 api_key）。
search:
  provider: "bing_browser"               # 默认免费浏览器搜索；也可填 google_browser / duckduckgo_browser / tavily / serper / brave
  api_key: ""                            # API provider 的 key；浏览器搜索留空

# Skills（per-agent 技能开关）
skills:
  enabled: ["skill-creator"]         # 启用的 skill 名称，如 ["pdf", "literary-craft"]

# 工作书桌
desk:
  heartbeat_enabled: false           # 巡检默认关闭，用户明确开启后才会自动巡检
  heartbeat_interval: 31             # 巡检间隔（分钟）

# 频道系统（agent 间协作通信）
channels:
  enabled: false                     # 是否参与频道轮转
